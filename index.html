<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSONL Formatter</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="toolbar">
        <div class="toolbar__row">
          <div class="actions" role="group" aria-label="Editor actions">
            <button id="upload-button" type="button">Upload</button>
            <button id="example-button" type="button">
              Insert example JSONL
            </button>
            <button id="copy-button" type="button">Copy</button>
            <button id="clear-button" type="button">Clear</button>
          </div>
          <h1 class="toolbar__title">JSONL Formatter</h1>

          <div class="toolbar__meta">
            <a
              class="toolbar__icon-link"
              href="https://github.com/A9-dev/formatjsonl"
              target="_blank"
              rel="noreferrer"
              aria-label="View the project on GitHub"
              title="View the project on GitHub"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 1.5a10.5 10.5 0 0 0-3.32 20.46c.53.1.72-.23.72-.51v-2.02c-2.93.64-3.55-1.24-3.55-1.24-.48-1.21-1.18-1.53-1.18-1.53-.96-.66.07-.64.07-.64 1.07.08 1.63 1.09 1.63 1.09.94 1.63 2.48 1.16 3.08.88.1-.69.37-1.16.67-1.43-2.34-.27-4.8-1.17-4.8-5.21 0-1.15.41-2.09 1.08-2.83-.1-.27-.47-1.38.11-2.88 0 0 .88-.28 2.89 1.08a10.1 10.1 0 0 1 5.27 0c2.01-1.36 2.88-1.08 2.88-1.08.58 1.5.21 2.61.11 2.88.68.74 1.08 1.68 1.08 2.83 0 4.05-2.47 4.93-4.82 5.19.38.33.72.98.72 1.99v2.96c0 .28.19.62.73.51A10.5 10.5 0 0 0 12 1.5Z"
                />
              </svg>
            </a>
            <p id="status" class="status" aria-live="polite">
              Ready for JSONL.
            </p>
          </div>
        </div>

        <input
          id="file-input"
          type="file"
          accept=".jsonl,.ndjson,.json"
          hidden
        />
      </header>

      <section class="editor-shell" aria-label="JSONL editor surface">
        <div class="editor-frame">
          <div id="editor" class="editor-host"></div>
        </div>
        <div id="empty-state" class="empty-state">
          <p>
            Paste raw JSONL, upload a file, or drop one anywhere in the editor.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
